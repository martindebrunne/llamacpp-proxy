openapi: 3.0.3
info:
  title: llamacpp-proxy API
  description: |
    OpenAI-compatible proxy server for llama.cpp with **dynamic model detection** and **thinking mode support**.
    
    ## Model Naming
    
    Use suffixes to control thinking mode:
    - `*-Think` - Enables thinking mode (e.g., `MyModel-Think`)
    - `*-No-Think` - Passthrough mode (e.g., `MyModel-No-Think`)
    - No suffix - Passthrough mode (e.g., `MyModel`)
    
    The proxy automatically extracts the real model name from incoming requests.
    
    Streaming compatibility notes:
    - Think mode preserves OpenAI-compatible `tool_calls` and `finish_reason` semantics.
    - No-Think mode forwards upstream SSE chunks unchanged.
    - Terminal `data: [DONE]` is preserved.
  version: 1.0.12
servers:
  - url: http://127.0.0.1:4000
    description: Local proxy server
tags:
  - name: completions
    description: Chat and text completion endpoints
  - name: models
    description: Model listing endpoints

paths:
  /chat/completions:
    post:
      summary: Chat completions (alias)
      operationId: postChatCompletions
      tags:
        - completions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Streaming response
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                tool_call_stream:
                  summary: SSE stream preserving tool-calling semantics
                  value: |
                    data: {"id":"chatcmpl-1","object":"chat.completion.chunk","created":1234567890,"model":"MyModel","choices":[{"index":0,"delta":{"tool_calls":[{"id":"call_1","type":"function","function":{"name":"my_tool","arguments":"{}"}}]},"finish_reason":null}]}

                    data: {"id":"chatcmpl-1","object":"chat.completion.chunk","created":1234567890,"model":"MyModel","choices":[{"index":0,"delta":{},"finish_reason":"tool_calls"}]}

                    data: [DONE]
        '500':
          description: Proxy error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/chat/completions:
    post:
      summary: Chat completions
      operationId: postV1ChatCompletions
      tags:
        - completions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Streaming response
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                tool_call_stream:
                  summary: SSE stream preserving tool-calling semantics
                  value: |
                    data: {"id":"chatcmpl-1","object":"chat.completion.chunk","created":1234567890,"model":"MyModel","choices":[{"index":0,"delta":{"tool_calls":[{"id":"call_1","type":"function","function":{"name":"my_tool","arguments":"{}"}}]},"finish_reason":null}]}

                    data: {"id":"chatcmpl-1","object":"chat.completion.chunk","created":1234567890,"model":"MyModel","choices":[{"index":0,"delta":{},"finish_reason":"tool_calls"}]}

                    data: [DONE]
        '500':
          description: Proxy error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /completions:
    post:
      summary: Completions (alias)
      operationId: postCompletions
      tags:
        - completions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompletionRequest'
      responses:
        '200':
          description: Streaming response
          content:
            text/event-stream:
              schema:
                type: string
        '500':
          description: Proxy error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/completions:
    post:
      summary: Completions
      operationId: postV1Completions
      tags:
        - completions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompletionRequest'
      responses:
        '200':
          description: Streaming response
          content:
            text/event-stream:
              schema:
                type: string
        '500':
          description: Proxy error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /models:
    get:
      summary: List models (alias)
      operationId: getModels
      tags:
        - models
      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelList'

  /v1/models:
    get:
      summary: List models
      operationId: getV1Models
      tags:
        - models
      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelList'

components:
  schemas:
    ChatCompletionRequest:
      type: object
      required:
        - model
        - messages
      properties:
        model:
          type: string
          description: Model name with optional suffix (e.g., `MyModel-Think`, `MyModel-No-Think`)
          example: Qwen3.5-35B-A3B-T-Think
        messages:
          type: array
          description: List of chat messages
          items:
            $ref: '#/components/schemas/Message'
        stream:
          type: boolean
          description: Enable SSE streaming response
        chat_template_kwargs:
          type: object
          description: Additional template parameters passed to llama.cpp
          properties:
            enable_thinking:
              type: boolean
              description: Enable thinking mode

    CompletionRequest:
      type: object
      required:
        - model
        - prompt
      properties:
        model:
          type: string
          description: Model name with optional suffix
          example: MyModel-Think
        prompt:
          type: string
          description: Text prompt to complete

    Message:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum:
            - user
            - assistant
            - system
          description: Message role
        content:
          type: string
          nullable: true
          description: Message content
        tool_calls:
          type: array
          items:
            $ref: '#/components/schemas/ToolCall'
          description: Tool calls emitted by assistant messages/chunks

    ToolCall:
      type: object
      required:
        - id
        - type
        - function
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - function
        function:
          $ref: '#/components/schemas/FunctionCall'

    FunctionCall:
      type: object
      required:
        - name
        - arguments
      properties:
        name:
          type: string
        arguments:
          type: string

    Model:
      type: object
      properties:
        id:
          type: string
          description: Model identifier
          example: Qwen3.5-35B-A3B-T-Think
        object:
          type: string
          example: model
        owned_by:
          type: string
          example: local

    ModelList:
      type: object
      properties:
        object:
          type: string
          example: list
        data:
          type: array
          description: List of available models
          items:
            $ref: '#/components/schemas/Model'

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error type
          example: proxy_error
        message:
          type: string
          description: Error message